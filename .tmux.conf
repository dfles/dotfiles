set-option -g detach-on-destroy off
set-window-option -g mode-keys vi

# Use <c-space> for prefix to better match nvim leader
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# vim-like select/copy
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi Y send-keys -X copy-end-of-line
bind-key p paste-buffer
bind-key -T copy-mode-vi _ send-keys -X back-to-indentation

# vim-like pane navigation (no wrap-around)
bind h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind l if -F '#{pane_at_right}'  '' 'select-pane -R'

# vim-like pane resizing (capital = resize, like nvim <C-w>H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind Tab last-window

# Some coloring to match kanagawabones
set -g status-style 'bg=#ddd8bb fg=#43436c'
set -g status-left '#[bg=#54546d,fg=#ddd8bb,bold] #S #[bg=#ddd8bb,fg=#43436c] '
set -g status-right '#[bg=#ddd8bb,fg=#43436c] %Y-%m-%d #[bg=#54546d,fg=#ddd8bb,bold] %H:%M '
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[bg=#7e9cd8,fg=#ddd8bb,bold] #I:#W [#F] '
set -g pane-border-style 'fg=#c9cbd1'
set -g pane-active-border-style 'fg=#7e9cd8'
set -g message-style 'bg=#7e9cd8 fg=#ddd8bb'
